<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>API Keys Vault{% block title_suffix %}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.min.css') }}">
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 600; letter-spacing: .02em; }
    .uid-mono { font-family: monospace; font-size: .85em; }
    .table td { vertical-align: middle; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('ui_keys') }}">API Keys Vault</a>
      {% if session.get('logged_in') %}
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('ui_keys') }}">Keys</a>
        </li>
      </ul>
      <form method="post" action="{{ url_for('ui_logout') }}" class="d-flex">
        <button class="btn btn-outline-secondary btn-sm" type="submit">Logout</button>
      </form>
      {% endif %}
    </div>
  </nav>

  <div class="container pb-5">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

  <script src="{{ url_for('static', filename='bootstrap.bundle.min.js') }}"></script>
</body>
</html>
